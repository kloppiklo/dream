<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DREAM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap');

:root {
  --bg: #05080f;
  --deep: #020408;
  --ice: #4a7fa5;
  --ice-bright: #7ab8d8;
  --ice-dim: #1e3a52;
  --text: #b8cdd8;
  --dim: #3a5068;
  --sector-closed: #0a1220;
  --sector-open: #152238;
  --sector-border: #1e3550;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  overflow: hidden;
}

.grain {
  position:fixed; inset:-50%; width:200%; height:200%;
  opacity:0.03; pointer-events:none; z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grain 0.4s steps(1) infinite;
}
@keyframes grain {
  0%,100%{transform:translate(0,0)} 10%{transform:translate(-2%,-3%)} 20%{transform:translate(3%,2%)}
  30%{transform:translate(-1%,4%)} 40%{transform:translate(2%,-1%)} 50%{transform:translate(-3%,1%)}
  60%{transform:translate(1%,3%)} 70%{transform:translate(-2%,-2%)} 80%{transform:translate(3%,-3%)}
}
.flash { position:fixed; inset:0; background:var(--ice-bright); opacity:0; pointer-events:none; z-index:998; transition:opacity 0.08s; }
.flash.active { opacity:0.06; }

/* ===== PRELOADER ===== */
.preloader {
  position:fixed; inset:0; background:var(--deep); z-index:900;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity 1.4s ease, transform 1.4s ease;
}
.preloader.fade-out { opacity:0; pointer-events:none; transform:scale(1.04); }
.pre-line {
  width:1px; height:56px; margin-bottom:36px;
  background:linear-gradient(to bottom, transparent, rgba(74,127,165,0.5), transparent);
  animation:grow-line 1.5s ease forwards; transform:scaleY(0); transform-origin:top;
}
@keyframes grow-line { to { transform:scaleY(1); } }
.pre-eyebrow { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.5em; color:var(--dim); text-transform:uppercase; margin-bottom:20px; opacity:0; animation:fade-up 1s ease 0.5s forwards; }
.pre-title { font-size:72px; font-weight:300; font-style:italic; letter-spacing:0.06em; color:var(--text); margin-bottom:44px; opacity:0; animation:fade-up 1s ease 0.8s forwards; }
.pre-icon { margin-bottom:28px; opacity:0; animation:fade-up 1s ease 1.1s forwards; }
.pre-icon svg { width:44px; height:44px; stroke:var(--ice); fill:none; stroke-width:1.2; }
.pre-text { font-size:15px; font-weight:300; color:var(--dim); letter-spacing:0.08em; text-align:center; line-height:2; max-width:260px; margin-bottom:52px; opacity:0; animation:fade-up 1s ease 1.4s forwards; }
.pre-text em { color:var(--ice-bright); font-style:italic; }
.pre-btn {
  font-family:'Courier Prime',monospace; font-size:10px; letter-spacing:0.45em;
  text-transform:uppercase; color:var(--bg); background:var(--ice);
  border:none; padding:15px 38px; cursor:pointer;
  transition:all 0.35s ease; opacity:0; animation:fade-up 1s ease 1.8s forwards;
}
.pre-btn:hover { background:var(--ice-bright); box-shadow:0 0 30px rgba(74,127,165,0.4); letter-spacing:0.55em; }
.pre-btn-line { width:1px; height:56px; background:linear-gradient(to bottom, rgba(74,127,165,0.4), transparent); margin-top:36px; opacity:0; animation:fade-up 1s ease 2s forwards; }
@keyframes fade-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ===== DREAM MAP ===== */
.dream-map {
  position:fixed; inset:0; background:var(--deep); z-index:100;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition:opacity 0.8s ease;
}
.dream-map.visible { opacity:1; pointer-events:all; }
.map-header {
  position:absolute; top:0; left:0; right:0;
  padding:28px 32px; display:flex; justify-content:space-between; align-items:center; z-index:10;
}
.map-logo { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.45em; color:var(--dim); text-transform:uppercase; }
.map-progress { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.3em; color:var(--dim); }
.map-progress span { color:var(--ice); }
.map-svg-wrap { position:absolute; inset:0; }
.map-svg-wrap svg { width:100%; height:100%; }

.sector { cursor:pointer; transition:all 0.6s; }
.sector.locked { cursor:not-allowed; }
.sector polygon { transition:fill 0.8s, filter 0.8s; }
.sector.locked polygon { fill:#0a1220; }
.sector.unlocked polygon { fill:#152238; filter:drop-shadow(0 0 8px rgba(74,127,165,0.2)); }
.sector.unlocked:hover polygon { fill:#1e3a55; filter:drop-shadow(0 0 16px rgba(74,127,165,0.4)); }
.sector-label { font-family:'Courier Prime',monospace; font-size:7.5px; letter-spacing:0.2em; text-transform:uppercase; fill:transparent; transition:fill 0.8s; pointer-events:none; }
.sector.unlocked .sector-label { fill:rgba(74,127,165,0.75); }
.sector-num { font-family:'Courier Prime',monospace; font-size:7px; fill:#1e3550; pointer-events:none; }

.map-hint { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.35em; color:var(--dim); text-transform:uppercase; animation:pulse-hint 3s ease-in-out infinite; }
@keyframes pulse-hint { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* ===== DREAM SCREEN ===== */
.dream-screen {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 1s ease;
}
.dream-screen.visible { opacity:1; pointer-events:all; }

.dream-gradient {
  position:absolute; inset:-20%; width:140%; height:140%;
  border-radius:40%; animation:grad-drift 14s ease-in-out infinite alternate;
  transition:background 3s ease; z-index:0;
}
@keyframes grad-drift {
  0%{transform:translate(-4%,-4%) scale(1)}
  33%{transform:translate(4%,-7%) scale(1.04)}
  66%{transform:translate(-2%,5%) scale(0.97)}
  100%{transform:translate(6%,3%) scale(1.03)}
}

.bg-circles { position:absolute; inset:0; pointer-events:none; z-index:1; }
.circle { position:absolute; border-radius:50%; border:1px solid rgba(74,127,165,0.07); transform:translate(-50%,-50%); transition:all 0.4s; }
.circle:nth-child(1){width:280px;height:280px;top:50%;left:50%}
.circle:nth-child(2){width:480px;height:480px;top:50%;left:50%;border-color:rgba(74,127,165,0.05)}
.circle:nth-child(3){width:680px;height:680px;top:50%;left:50%}
.circle:nth-child(4){width:880px;height:880px;top:50%;left:50%;border-color:rgba(74,127,165,0.04)}
.circle:nth-child(5){width:1080px;height:1080px;top:50%;left:50%}

.dream-header { position:absolute; top:0; left:0; right:0; padding:28px 32px; display:flex; justify-content:space-between; align-items:flex-start; z-index:10; }
.d-logo { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.4em; color:var(--dim); text-transform:uppercase; }
.d-depth { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.3em; color:var(--dim); text-align:right; }
.d-depth span { color:var(--ice); }

.d-status { position:absolute; top:50%; right:32px; transform:translateY(-50%); font-family:'Courier Prime',monospace; font-size:8px; letter-spacing:0.3em; color:var(--dim); text-transform:uppercase; writing-mode:vertical-rl; display:flex; flex-direction:column; gap:10px; align-items:center; z-index:10; }
.status-line { width:1px; height:36px; background:linear-gradient(to bottom, transparent, var(--dim), transparent); }

.dream-center { position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; }
.totem-wrap { position:relative; width:110px; height:110px; margin-bottom:44px; }
.totem { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.totem-ring { position:absolute; inset:0; border-radius:50%; border:1px solid rgba(74,127,165,0.18); animation:ring-pulse 4s ease-in-out infinite; }
.totem-ring:nth-child(2){inset:-14px;border-color:rgba(74,127,165,0.1);animation-delay:-1.3s}
.totem-ring:nth-child(3){inset:-28px;border-color:rgba(74,127,165,0.05);animation-delay:-2.6s}
@keyframes ring-pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.02)} }
.totem-inner { width:56px; height:56px; border-radius:50%; background:radial-gradient(circle at 35% 35%, rgba(74,127,165,0.25), rgba(74,127,165,0.04)); border:1px solid rgba(74,127,165,0.35); display:flex; align-items:center; justify-content:center; transition:all 0.3s; box-shadow:0 0 20px rgba(74,127,165,0.08); }
.totem-inner svg { width:20px; height:20px; stroke:var(--ice); fill:none; stroke-width:1.2; }
.totem-inner.listening { border-color:rgba(74,127,165,0.8); animation:breathe 2s ease-in-out infinite; }
@keyframes breathe { 0%,100%{box-shadow:0 0 30px rgba(74,127,165,0.2)} 50%{box-shadow:0 0 60px rgba(74,127,165,0.5),0 0 120px rgba(74,127,165,0.18)} }

.d-level-title { font-family:'Courier Prime',monospace; font-size:10px; letter-spacing:0.5em; color:var(--dim); text-transform:uppercase; margin-bottom:10px; transition:color 0.5s; }
.d-dream-name { font-size:48px; font-weight:300; font-style:italic; letter-spacing:0.03em; color:var(--text); line-height:1; margin-bottom:14px; transition:all 0.8s; text-align:center; }
.d-dream-desc { font-family:'Courier Prime',monospace; font-size:11px; letter-spacing:0.15em; color:var(--dim); text-align:center; min-height:18px; max-width:280px; transition:all 0.5s; }
.d-hint { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.2em; color:var(--ice-dim); text-align:center; margin-top:20px; max-width:240px; font-style:italic; opacity:0.8; }

.visualizer { position:absolute; bottom:88px; left:50%; transform:translateX(-50%); display:flex; gap:3px; align-items:flex-end; height:28px; opacity:0; transition:opacity 0.5s; z-index:10; }
.visualizer.visible { opacity:1; }
.bar { width:3px; background:var(--ice); border-radius:2px; min-height:2px; transition:height 0.08s; opacity:0.5; }

.exit-btn { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.4em; text-transform:uppercase; color:var(--dim); background:none; border:1px solid var(--sector-border); padding:10px 24px; cursor:pointer; transition:all 0.3s; z-index:10; }
.exit-btn:hover { color:var(--ice); border-color:var(--ice); box-shadow:0 0 16px rgba(74,127,165,0.15); }

.notification { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) translateY(16px); background:rgba(2,4,8,0.96); border:1px solid rgba(74,127,165,0.3); padding:18px 30px; text-align:center; opacity:0; pointer-events:none; transition:all 0.6s; z-index:500; max-width:260px; }
.notification.show { opacity:1; transform:translate(-50%,-50%) translateY(0); }
.notif-title { font-family:'Courier Prime',monospace; font-size:9px; letter-spacing:0.4em; color:var(--ice); margin-bottom:7px; text-transform:uppercase; }
.notif-text { font-size:17px; font-style:italic; font-weight:300; color:var(--text); }

body.limbo { --ice:#6a4a8a; --ice-bright:#9a7ab8; --ice-dim:#2a1a3a; --text:#8888a8; --dim:#3a2a4a; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="flash" id="flash"></div>

<script>
const dreams = [
  { name:'Quiet Dream',    title:'сон первый',          desc:'тишина — первый шаг вглубь',            unlockDesc:'Quiet Dream открыт',               condition:'always',   hint:null,
    g1:'radial-gradient(ellipse at 30% 40%, #0d1a2e 0%, #05080f 60%, #020408 100%)',

    g1:'radial-gradient(ellipse at 20% 60%, #0a1828 0%, #05080f 60%, #020408 100%)',
    g2:'radial-gradient(ellipse at 80% 30%, #071420 0%, #04070e 60%, #020408 100%)' },
  { name:'Action Dream',   title:'сон третий',           desc:'движение рождает новые миры',           unlockDesc:'Action Dream: звук пробудил мир',  condition:'sound',    hint:'Издай громкий звук',
    g1:'radial-gradient(ellipse at 50% 20%, #0f1e30 0%, #060a12 60%, #020408 100%)',
    g2:'radial-gradient(ellipse at 50% 80%, #0c1a28 0%, #050910 60%, #020408 100%)' },
  { name:'Sleep Dream',    title:'сон четвёртый',        desc:'граница между мирами исчезает',         unlockDesc:'Sleep Dream: ты растворилась',     condition:'sleep',    hint:'Тишина и неподвижность 10 секунд',
    g1:'radial-gradient(ellipse at 40% 50%, #081520 0%, #040810 70%, #020306 100%)',
    g2:'radial-gradient(ellipse at 60% 50%, #06121c 0%, #03070e 70%, #020306 100%)' },
  { name:'Sunshine Dream', title:'сон пятый',            desc:'свет проникает сквозь веки',            unlockDesc:'Sunshine Dream: солнце нашло тебя',condition:'daytime',  hint:'Открой между 11:00 и 17:00',
    g1:'radial-gradient(ellipse at 60% 30%, #122030 0%, #070c15 60%, #030508 100%)',
    g2:'radial-gradient(ellipse at 40% 70%, #0e1c2c 0%, #060a14 60%, #030508 100%)' },
  { name:'Full Moon Dream',title:'сон шестой',           desc:'луна смотрит сквозь закрытые глаза',    unlockDesc:'Full Moon Dream: ночь открыла путь',condition:'night',    hint:'Открой после 22:00',
    g1:'radial-gradient(ellipse at 50% 40%, #0a1525 0%, #05090f 70%, #020307 100%)',
    g2:'radial-gradient(ellipse at 50% 60%, #081220 0%, #04080e 70%, #020307 100%)' },
  { name:'Africa Dream',   title:'сон седьмой',          desc:'ты далеко — совсем в другом мире',      unlockDesc:'Africa Dream: другой мир открыт',  condition:'location', hint:'Уйди далеко от привычного места',
    g1:'radial-gradient(ellipse at 30% 60%, #0c1822 0%, #060a12 65%, #020408 100%)',
    g2:'radial-gradient(ellipse at 70% 40%, #091520 0%, #050910 65%, #020408 100%)' },
  { name:'Airport Dream',  title:'сон восьмой',          desc:'между мирами — ни здесь ни там',        unlockDesc:'Airport Dream: три сигнала',        condition:'impulse3', hint:'Хлопни 3 раза подряд',
    g1:'radial-gradient(ellipse at 20% 40%, #0b1828 0%, #060a14 65%, #020408 100%)',
    g2:'radial-gradient(ellipse at 80% 60%, #091522 0%, #050910 65%, #020408 100%)' },
  { name:'Reverie Dream',  title:'сон девятый',          desc:'мечта без ограничений',                 unlockDesc:'Reverie Dream: ты здесь давно',    condition:'time5min', hint:'Оставайся в приложении 5 минут',
    g1:'radial-gradient(ellipse at 50% 30%, #0a1620 0%, #05090f 70%, #020307 100%)',
    g2:'radial-gradient(ellipse at 50% 70%, #081320 0%, #04080e 70%, #020307 100%)' },
  { name:'Reward Dream',   title:'сон десятый',          desc:'ты прошла дальше всех',                 unlockDesc:'Reward Dream: все пути пройдены',  condition:'allprev',  hint:'Открой все предыдущие сны',
    g1:'radial-gradient(ellipse at 40% 40%, #0c1a2c 0%, #060b15 65%, #020409 100%)',
    g2:'radial-gradient(ellipse at 60% 60%, #091525 0%, #050a12 65%, #020409 100%)' },
  { name:'Limbo',          title:'глубочайший уровень',  desc:'возврата нет',                          unlockDesc:'Лимбо — ты на самом дне',          condition:'limbo',    hint:null,
    g1:'radial-gradient(ellipse at 50% 50%, #0d0818 0%, #060408 70%, #020204 100%)',
    g2:'radial-gradient(ellipse at 50% 50%, #080510 0%, #040306 70%, #020204 100%)' },
];

let unlocked = [true,...new Array(10).fill(false)];
let currentDream = 0;
let audioCtx=null, analyser=null, source=null, stream=null, listening=false, dataArray=null;
let prevVol=0, silentF=0, loudF=0, stillF=0, sleepF=0;
let impulseCount=0, impulseTimer=null, impulseDetected=false;
let sessionStart=null, motionDelta=0, gradPhase=0;
let musicNodes=[], musicGain=null;
let reverbNode=null, delayNode=null, filterNode=null, outputGain=null;

const mCfg=[
  {drone:27.5,chord:[55,82,110],vol:0.05,boom:0},
  {drone:24,  chord:[48,72,96], vol:0.07,boom:0},
  {drone:36.7,chord:[55,73,92], vol:0.09,boom:9000},
  {drone:20,  chord:[40,60,80], vol:0.10,boom:7000},
  {drone:29.1,chord:[58,87,116],vol:0.09,boom:8000},
  {drone:18,  chord:[36,54,72], vol:0.11,boom:6000},
  {drone:22,  chord:[44,66,88], vol:0.11,boom:6500},
  {drone:16,  chord:[32,48,64], vol:0.12,boom:5000},
  {drone:14,  chord:[28,42,56], vol:0.13,boom:4000},
  {drone:12,  chord:[24,36,48], vol:0.14,boom:3000},
  {drone:10,  chord:[20,30,40], vol:0.15,boom:2000},
];

// ---- SCREENS ----
function startExperience(){
  const p=document.getElementById('preloader');
  p.classList.add('fade-out');
  setTimeout(()=>{ p.style.display='none'; showMap(); },1400);
}
function showMap(){ updateMapUI(); document.getElementById('dreamMap').classList.add('visible'); document.getElementById('dreamScreen').classList.remove('visible'); }
function enterDream(i){
  if(!unlocked[i]) return;
  currentDream=i;
  updateDreamUI(i);
  document.getElementById('dreamMap').classList.remove('visible');
  setTimeout(()=>document.getElementById('dreamScreen').classList.add('visible'),100);
  document.body.classList.toggle('limbo',i===10);
}
function exitDream(){ if(listening) stopListening(); document.getElementById('dreamScreen').classList.remove('visible'); setTimeout(()=>showMap(),200); }

function updateMapUI(){
  document.getElementById('mapCount').textContent=unlocked.filter(Boolean).length;
  unlocked.forEach((u,i)=>{ const s=document.getElementById('sec'+i); if(s){ s.classList.toggle('unlocked',u); s.classList.toggle('locked',!u); } });
  if(unlocked.filter(Boolean).length>1) document.getElementById('mapHint').style.opacity='0';
}
function updateDreamUI(i){
  const d=dreams[i];
  document.getElementById('dreamName').textContent=d.name;
  document.getElementById('levelTitle').textContent=d.title;
  document.getElementById('dreamDesc').textContent=listening?d.desc:'коснись чтобы погрузиться';
  document.getElementById('depthNum').textContent=i+1;
  document.getElementById('dreamHint').textContent=d.hint||'';
  document.getElementById('dreamGradient').style.background=d.g1;
}

// ---- AUDIO ----
async function toggleListening(){ if(!listening) await startListening(); else stopListening(); }
async function startListening(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.8;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    source=audioCtx.createMediaStreamSource(stream);
    setupFX(); startMusic(currentDream);
    listening=true; sessionStart=Date.now();
    document.getElementById('totemInner').classList.add('listening');
    document.getElementById('visualizer').classList.add('visible');
    document.getElementById('dreamDesc').textContent=dreams[currentDream].desc;
    document.getElementById('statusText').textContent='слушаю';
    requestAnimationFrame(tick);
  }catch(e){ document.getElementById('dreamDesc').textContent='доступ к микрофону запрещён'; }
}
function stopListening(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  stopMusic(); listening=false;
  document.getElementById('totemInner').classList.remove('listening');
  document.getElementById('visualizer').classList.remove('visible');
  document.getElementById('dreamDesc').textContent='коснись чтобы погрузиться';
  document.getElementById('statusText').textContent='ожидание';
}
function setupFX(){
  const e=dreams[currentDream];
  const effects={reverb:0.1+currentDream*0.09, delay:0.05+currentDream*0.13, filter:Math.max(300,8000-currentDream*700)};
  [reverbNode,delayNode,filterNode,outputGain].forEach(n=>{try{n&&n.disconnect()}catch(x){}});
  filterNode=audioCtx.createBiquadFilter(); filterNode.type='lowpass'; filterNode.frequency.value=effects.filter;
  delayNode=audioCtx.createDelay(3); delayNode.delayTime.value=effects.delay;
  const dFb=audioCtx.createGain(); dFb.gain.value=0.4;
  const dW=audioCtx.createGain(); dW.gain.value=0.35;
  const dD=audioCtx.createGain(); dD.gain.value=0.65;
  reverbNode=audioCtx.createConvolver(); reverbNode.buffer=mkRev(audioCtx,3+effects.reverb*5,2+effects.reverb*3);
  const rW=audioCtx.createGain(); rW.gain.value=effects.reverb*0.55;
  outputGain=audioCtx.createGain(); outputGain.gain.value=1.2;
  source.connect(analyser); source.connect(filterNode);
  filterNode.connect(dD); dD.connect(outputGain);
  filterNode.connect(delayNode); delayNode.connect(dFb); dFb.connect(delayNode); delayNode.connect(dW); dW.connect(outputGain);
  filterNode.connect(reverbNode); reverbNode.connect(rW); rW.connect(outputGain);
  outputGain.connect(audioCtx.destination);
}
function mkRev(ctx,dur,decay){
  const sr=ctx.sampleRate,len=sr*dur,b=ctx.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return b;
}
function startMusic(idx){
  stopMusic();
  const cfg=mCfg[Math.min(idx,mCfg.length-1)];
  const ctx=audioCtx;
  musicGain=ctx.createGain(); musicGain.gain.setValueAtTime(0,ctx.currentTime); musicGain.gain.linearRampToValueAtTime(cfg.vol,ctx.currentTime+3);
  const mr=ctx.createConvolver(); mr.buffer=mkRev(ctx,8,1.5);
  const mf=ctx.createBiquadFilter(); mf.type='lowpass'; mf.frequency.value=700;
  musicGain.connect(mf); mf.connect(mr); mr.connect(ctx.destination);
  const dr=ctx.createOscillator(); dr.type='sine'; dr.frequency.value=cfg.drone;
  const dg=ctx.createGain(); dg.gain.value=0.5;
  const lfo=ctx.createOscillator(); lfo.frequency.value=0.05;
  const lg=ctx.createGain(); lg.gain.value=cfg.drone*0.02;
  lfo.connect(lg); lg.connect(dr.frequency); dr.connect(dg); dg.connect(musicGain);
  dr.start(); lfo.start(); musicNodes.push(dr,lfo);
  cfg.chord.forEach((f,i)=>{
    const o=ctx.createOscillator(); o.type=i?'triangle':'sine'; o.frequency.value=f;
    const og=ctx.createGain(); og.gain.value=0.13/(i+1);
    const v=ctx.createOscillator(); v.frequency.value=0.03+i*0.02;
    const vg=ctx.createGain(); vg.gain.value=f*0.003;
    v.connect(vg); vg.connect(o.frequency); o.connect(og); og.connect(musicGain);
    o.start(); v.start(); musicNodes.push(o,v);
  });
  if(cfg.boom>0){
    function braaam(){
      if(!listening||!audioCtx) return;
      const now=audioCtx.currentTime;
      const o=audioCtx.createOscillator(); o.type='sawtooth';
      o.frequency.setValueAtTime(cfg.drone*0.5,now); o.frequency.linearRampToValueAtTime(cfg.drone*0.52,now+3);
      const g=audioCtx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.07,now+1.5); g.gain.linearRampToValueAtTime(0,now+4);
      const bf=audioCtx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=cfg.drone*2; bf.Q.value=0.8;
      o.connect(g); g.connect(bf); bf.connect(musicGain); o.start(now); o.stop(now+5);
      setTimeout(braaam,cfg.boom);
    }
    setTimeout(braaam,5000);
  }
  musicNodes.push(musicGain);
}
function stopMusic(){ musicNodes.forEach(n=>{try{n.stop()}catch(e){} try{n.disconnect()}catch(e){}}); musicNodes=[]; musicGain=null; }

// ---- TICK ----
function tick(){
  if(!listening) return;
  requestAnimationFrame(tick);
  const vol=getVol(), freq=getFreq();
  for(let i=0;i<15;i++){ const b=document.getElementById('b'+i); if(b){const h=Math.max(2,(freq[i*Math.floor(freq.length/15)]/255)*26);b.style.height=h+'px';b.style.opacity=0.3+(h/26)*0.7;} }
  const s=1+vol*3;
  document.getElementById('c1').style.transform=`translate(-50%,-50%) scale(${s})`;
  document.getElementById('c2').style.transform=`translate(-50%,-50%) scale(${1+vol*2})`;
  document.getElementById('c3').style.transform=`translate(-50%,-50%) scale(${1+vol*1.5})`;
  gradPhase+=0.005;
  const d=dreams[currentDream];
  document.getElementById('dreamGradient').style.background=(Math.sin(gradPhase)>0)?d.g1:d.g2;
  checkUnlocks(vol);
  prevVol=vol;
}
function getVol(){ if(!analyser||!dataArray) return 0; analyser.getByteTimeDomainData(dataArray); let s=0; for(let i=0;i<dataArray.length;i++){const v=(dataArray[i]-128)/128;s+=v*v;} return Math.sqrt(s/dataArray.length); }
function getFreq(){ if(!analyser||!dataArray) return new Uint8Array(128).fill(0); const f=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(f); return f; }

// ---- MOTION ----
window.addEventListener('devicemotion',e=>{ const a=e.accelerationIncludingGravity; if(a) motionDelta=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0); });

// ---- GEO ----
let _homeLat=null,_homeLon=null,userLat=null,userLon=null;
if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(p=>{ userLat=p.coords.latitude; userLon=p.coords.longitude; if(!_homeLat){_homeLat=userLat;_homeLon=userLon;} }); }
function geoDist(la1,lo1,la2,lo2){ const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }

// ---- UNLOCKS ----
function checkUnlocks(vol){
  const delta=vol-prevVol;
  if(delta>0.06&&!impulseDetected){ impulseDetected=true; flashFX(); handleImpulse(); setTimeout(()=>{impulseDetected=false;},200); }
  if(unlocked[0]&&!unlocked[1]){ if(motionDelta<1.5){stillF++;if(stillF>300)unlockDream(1);}else stillF=0; }
  if(unlocked[1]&&!unlocked[2]){ if(vol>0.04){loudF++;if(loudF>10){unlockDream(2);loudF=0;}}else loudF=Math.max(0,loudF-1); }
  if(unlocked[2]&&!unlocked[3]){ if(vol<0.01&&motionDelta<1.5){sleepF++;if(sleepF>600)unlockDream(3);}else sleepF=0; }
  if(unlocked[3]&&!unlocked[4]){ const h=new Date().getHours(); if(h>=11&&h<17) unlockDream(4); }
  if(unlocked[4]&&!unlocked[5]){ const h=new Date().getHours(); if(h>=22||h<4) unlockDream(5); }
  if(unlocked[5]&&!unlocked[6]&&userLat!==null&&_homeLat!==null){ if(geoDist(userLat,userLon,_homeLat,_homeLon)>50) unlockDream(6); }
  if(unlocked[7]&&!unlocked[8]&&sessionStart){ if(Date.now()-sessionStart>300000) unlockDream(8); }
  if(unlocked[8]&&!unlocked[9]){ if(unlocked.slice(0,9).every(Boolean)) unlockDream(9); }
  if(unlocked[9]&&!unlocked[10]){ setTimeout(()=>unlockDream(10),2000); }
}
function handleImpulse(){ if(!unlocked[6]||unlocked[7]) return; impulseCount++; if(impulseCount>=3){unlockDream(7);impulseCount=0;} clearTimeout(impulseTimer); impulseTimer=setTimeout(()=>{impulseCount=0;},3000); }
function unlockDream(i){ if(unlocked[i]) return; unlocked[i]=true; showNotif(dreams[i].unlockDesc); updateMapUI(); }
function flashFX(){ const f=document.getElementById('flash'); f.classList.add('active'); setTimeout(()=>f.classList.remove('active'),150); }
function showNotif(text){ const n=document.getElementById('notif'); document.getElementById('notifText').textContent=text; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),3500); }
</script>
